<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iCalculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="calculator">
    <div id="top-bar">
        <button id="modeToggle">☀️</button>
        <button id="sciToggle">ƒx</button>
    </div>
    <input id="display" readonly value="0">
    <div id="keys">
        <button class="function-btn" onclick="clearDisplay()">AC</button>
        <button class="function-btn" onclick="appendToDisplay('%')">%</button>
        <button class="function-btn operator-btn" onclick="setOperator('/')">÷</button>
        <button class="operator-btn" onclick="setOperator('*')">×</button>
        <button onclick="appendToDisplay('7')">7</button>
        <button onclick="appendToDisplay('8')">8</button>
        <button onclick="appendToDisplay('9')">9</button>
        <button class="operator-btn" onclick="setOperator('-')">−</button>
        <button onclick="appendToDisplay('4')">4</button>
        <button onclick="appendToDisplay('5')">5</button>
        <button onclick="appendToDisplay('6')">6</button>
        <button class="operator-btn" onclick="setOperator('+')">+</button>
        <button onclick="appendToDisplay('1')">1</button>
        <button onclick="appendToDisplay('2')">2</button>
        <button onclick="appendToDisplay('3')">3</button>
        <button class="operator-btn equals" onclick="calculate()">=</button>
        <button class="zero" onclick="appendToDisplay('0')">0</button>
        <button onclick="appendToDisplay('.')">.</button>
    </div>
    <!-- Scientific Panel -->
    <div id="scientific">
        <button onclick="appendToDisplay('Math.sin(')">sin</button>
        <button onclick="appendToDisplay('Math.cos(')">cos</button>
        <button onclick="appendToDisplay('Math.tan(')">tan</button>
        <button onclick="appendToDisplay('Math.sqrt(')">√</button>
    </div>
</div>
<div class="time-panel">
    <div id="time">00:00</div>
    <div id="date">Monday, 1 January</div>
</div>
<div class="branding">
    <div class="brand-title">iCalculator</div>
    <div class="brand-sub">Designed by Aditya</div>
</div>
<script src="index.js"></script>
</body>
</html>
